<!DOCTYPE html>
<html lang="es">
<head>
    <title>Contáctanos | Aula Virtual SENATI</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root { --senati-blue: #002F6C; --senati-cyan: #0056b3; --dark-bg: #0f141c; --card-bg: #17202a; --border-color: #2c3e50; }
        body { background-color: var(--dark-bg); color: #ffffff; font-family: 'Roboto', sans-serif; margin: 0; text-align: center; }
        h1, h2, h3, .nav-link { font-family: 'Oswald', sans-serif; }
        .banner-header { background-color: var(--senati-blue); padding: 35px 20px; display: flex; justify-content: center; align-items: center; border-bottom: 4px solid #0080ff; box-shadow: 0 4px 25px rgba(0, 47, 108, 0.4); }
        .banner-header img { max-width: 260px; height: auto; }
        .navbar { background-color: #0b0f14 !important; border-bottom: 2px solid var(--border-color); }
        .navbar-nav { margin: 0 auto; }
        .nav-link { color: #ffffff !important; text-transform: uppercase; font-weight: bold; margin: 0 12px; transition: 0.3s; }
        .nav-link:hover { color: #0080ff !important; }
        .nav-link.active { color: #0080ff !important; border-bottom: 2px solid #0080ff; }
        .contenido { margin: 40px auto; max-width: 850px; background-color: var(--card-bg); padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); border-left: 5px solid var(--senati-cyan); text-align: left; }
        .contenido h2 { color: #ffffff; font-weight: 700; font-size: 2.4rem; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
        
        /* Inputs estéticos oscuros */
        .form-control {
            background-color: #0f141c;
            border: 1px solid var(--border-color);
            color: #fff !important;
        }
        .form-control:focus {
            background-color: #1f2a38;
            border-color: #0080ff;
            box-shadow: 0 0 8px rgba(0, 128, 255, 0.3);
        }
        .btn-submit {
            background-color: var(--senati-cyan);
            color: white;
            font-weight: bold;
            border: none;
            padding: 10px 25px;
            transition: 0.3s;
        }
        .btn-submit:hover {
            background-color: #0080ff;
        }
        footer { background-color: #0b0f14; padding: 30px; margin-top: 60px; border-top: 1px solid var(--border-color); color: #7f8c8d; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header class="banner-header">
        <img src="https://www.senati.edu.pe/sites/all/themes/senati_theme/img/logo.svg" alt="Senati">
    </header>

    <nav class="navbar navbar-expand-sm navbar-dark">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="quienesSomos.html">Quiénes Somos</a></li>
                    <li class="nav-item"><a class="nav-link" href="nuestrosServicios.html">Nuestros Servicios</a></li>
                    <li class="nav-item"><a class="nav-link" href="sucursales.html">Sucursales</a></li>
                    <li class="nav-item"><a class="nav-link" href="ubicacion.html">Ubicación</a></li>
                    <li class="nav-item"><a class="nav-link" href="contactanos.html">Contáctanos</a></li>
                    <li class="nav-item"><a class="nav-link" href="reclamos.html">Reclamos</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="contenido">
            <h2>Mesa de Partes / Contacto Académico</h2>
            <form action="#" method="POST">
                <div class="mb-3">
                    <label for="nombre" class="form-label text-white">Nombre Completo del Aprendiz</label>
                    <input type="text" class="form-control" id="nombre" required placeholder="Ej. Elien Adriel">
                </div>
                <div class="mb-3">
                    <label for="correo" class="form-label text-white">Correo Electrónico Institucional</label>
                    <input type="email" class="form-control" id="correo" required placeholder="usuario@senati.pe">
                </div>
                <div class="mb-3">
                    <label for="mensaje" class="form-label text-white">Consulta Técnica / Solicitud</label>
                    <textarea class="form-control" id="mensaje" rows="4" required placeholder="Escribe tu requerimiento aquí..."></textarea>
                </div>
                <button type="submit" class="btn btn-submit">Enviar Solicitud</button>
            </form>
        </div>
    </main>

    <footer>
        <p>© 2026 SENATI | Dirección de Tecnologías de la Información</p>
        <p><small>Proyecto desarrollado por Adriel Mendoza Chambilla — Ingeniería de Ciencia de Datos e IA</small></p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
